<script>
    const slider = document.getElementById('comparison-slider');
    const drag = document.getElementById('slider-drag');
    const beforeWrapper = document.getElementById('before-image-wrapper');
    const tooltip = document.getElementById('slider-tooltip');
    let isDragging = false;

    const updatePosition = (clientX) => {
        const rect = slider.getBoundingClientRect();
        let position = ((clientX - rect.left) / rect.width) * 100;
        
        position = Math.max(0, Math.min(position, 100));
        
        drag.style.left = `${position}%`;
        beforeWrapper.style.width = `${position}%`;

        if (tooltip && tooltip.style.opacity !== '0') {
            tooltip.style.opacity = '0';
        }
    };

    const handleStart = (e) => {
        isDragging = true;
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        updatePosition(clientX);
    };

    const handleEnd = () => {
        isDragging = false;
    };

    const handleMove = (e) => {
        if (!isDragging) return;
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        updatePosition(clientX);
    };

    drag.addEventListener('mousedown', handleStart);
    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('mousemove', handleMove);

    drag.addEventListener('touchstart', handleStart, { passive: false });
    window.addEventListener('touchend', handleEnd);
    window.addEventListener('touchmove', handleMove, { passive: false });

    const resizeBeforeImage = () => {
        const beforeImg = beforeWrapper.querySelector('img');
        const sliderRect = slider.getBoundingClientRect();
        if (beforeImg && sliderRect.width > 0) {
            beforeImg.style.width = `${sliderRect.width}px`;
        }
    };

    window.addEventListener('resize', resizeBeforeImage);
    window.addEventListener('load', resizeBeforeImage);

    // Initial Position
    drag.style.left = '40%';
    beforeWrapper.style.width = '40%';

    // Tooltip interaction
    setTimeout(() => {
        if (tooltip) tooltip.style.opacity = '1';
        setTimeout(() => {
            if (tooltip) tooltip.style.opacity = '0';
        }, 3500);
    }, 1200);
</script>
